# docker-compose.yml
# Full stack: React (Vite) + PHP native + MySQL + phpMyAdmin
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: react-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:8080"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - app

  app:
    build: .
    container_name: php-backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000 index.php
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql-backend
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_ukk
      MYSQL_USER: denn
      MYSQL_PASSWORD: denn123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/storage/storage.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8090:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data:
